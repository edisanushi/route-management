<div class="auth-wrapper">

  <div class="sky-bg">
    <div class="stars"></div>
    <div class="route-line"></div>
  </div>

  <div class="auth-card">

    <div class="card-header">
      <div class="logo">
        <mat-icon class="logo-icon">flight</mat-icon>
        <span class="logo-text">RouteManagement</span>
      </div>
      <h1 class="card-title">Welcome Back</h1>
      <p class="card-subtitle">Sign in to manage your routes and fares</p>
    </div>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="alert alert-error" *ngIf="error$ | async as error">
        <mat-icon class="alert-icon">warning</mat-icon>
        <span>{{ error }}</span>
      </div>

      <div class="form-group">
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Email Address</mat-label>
          <mat-icon matPrefix class="input-icon">mail_outline</mat-icon>
          <input
            matInput
            id="email"
            type="email"
            [class.input-error]="email?.invalid && email?.touched"
            formControlName="email"
            placeholder="you@airline.com"
            autocomplete="email"
          />
          <mat-error *ngIf="email?.invalid && email?.touched">
            Please enter a valid email address.
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-group">
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix class="input-icon">lock_outline</mat-icon>
          <input
            matInput
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            [class.input-error]="password?.invalid && password?.touched"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            mat-icon-button
            matSuffix
            (click)="togglePassword()">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="password?.invalid && password?.touched">
            Password must be at least 8 characters.
          </mat-error>
        </mat-form-field>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="isLoading$ | async">
        <span *ngIf="!(isLoading$ | async)" class="btn-content">
          <mat-icon>login</mat-icon>
          Sign In
        </span>
        <span *ngIf="isLoading$ | async" class="loading-text">
          <span class="spinner"></span>
          Signing in...
        </span>
      </button>

    </form>

    <div class="card-footer">
      <p>Route Fare Management Platform &copy; 2026</p>
    </div>

  </div>
</div>
