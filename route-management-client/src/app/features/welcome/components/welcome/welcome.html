<div class="welcome-container">
  <div class="welcome-card">

    <div class="logo-section">
      <mat-icon class="logo-icon">flight</mat-icon>
      <h1>Route Fare Management Platform</h1>
      <p class="subtitle">
        Seasonal route and fare management for tour operators
      </p>
    </div>

    <mat-divider></mat-divider>

    <div class="features-section">
      <div class="feature-item" *ngFor="let feature of features">
        <mat-icon color="primary">{{ feature.icon }}</mat-icon>
        <span>{{ feature.label }}</span>
      </div>
    </div>

    <mat-divider></mat-divider>

    <div class="action-section">
      <button
        mat-raised-button
        color="primary"
        routerLink="/auth/login">
        <mat-icon>login</mat-icon>
        Get Started
      </button>
    </div>

  </div>
</div>
