services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: routemanagement-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "RouteManagement_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "RouteManagement_2026!", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  seq:
    image: datalust/seq:latest
    container_name: routemanagement-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "Admin_2026!"
    ports:
      - "5341:80"
    volumes:
      - seqdata:/data

  api:
    build:
      context: .
      dockerfile: RouteManagement.API/Dockerfile
    container_name: routemanagement-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=RouteManagement;User Id=sa;Password=RouteManagement_2026!;TrustServerCertificate=True;"
      JwtSettings__SecretKey: "uqw44mqXhw6eEvNoj/NxUJr6xuVJiYbtmyl1CfwwNy2Q7ixLke+Uqg8cgW6igNz2ZpqZFs++snJ0tgu31jRfiw=="
      JwtSettings__Issuer: "RouteManagementAPI"
      JwtSettings__Audience: "RouteManagementClient"
      JwtSettings__ExpiryMinutes: "60"
      Seq__Url: "http://seq:80"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      seq:
        condition: service_started

  client:
    build:
      context: ./route-management-client
      dockerfile: Dockerfile
    container_name: routemanagement-client
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  sqldata:
  seqdata: